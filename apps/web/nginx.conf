# nginx config for serving the Angular SPA.
#
# The only non-trivial directive is `try_files $uri $uri/ /index.html`:
# any request that doesn't match a real file (e.g., /segments/abc) falls
# back to index.html so the Angular router can take over.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache hashed asset chunks aggressively — Angular's outputHashing
  # means filenames change when content changes, so we can be liberal.
  location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA fallback. Any URL the user types in their browser that isn't a
  # real file ends up rendering index.html, where the Angular router
  # resolves it to a component.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
